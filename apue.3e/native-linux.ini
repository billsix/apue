# Meson native file for the in-container build.
# Routes compilation through the musl-clang wrapper installed at
# /apue/musl/bldInstall/bin/musl-clang by the Dockerfile.

[binaries]
c = '/apue/musl/bldInstall/bin/musl-clang'
ar = 'ar'
strip = 'strip'

[built-in options]
c_args = []
c_link_args = []
